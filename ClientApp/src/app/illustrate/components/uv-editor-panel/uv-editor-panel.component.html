<div class="uv-panel">

  <!-- Header -->
  <div class="uv-header">
    <button class="uv-exit-btn" (click)="close()">&#8592; Close</button>
    <span class="uv-title">UV Editor</span>
  </div>

  <div class="uv-body">

    <!-- ── Display ─────────────────────────────────────────────── -->
    <div class="uv-section">
      <div class="uv-section-title uv-section-toggle" (click)="displayCollapsed = !displayCollapsed">
        <span class="uv-chevron">{{ displayCollapsed ? '▸' : '▾' }}</span>Display
      </div>
      <ng-container *ngIf="!displayCollapsed">
        <label class="uv-check-row"><input type="checkbox" [checked]="showWireframe" (change)="toggleWireframe()"> Wireframe</label>
        <label class="uv-check-row"><input type="checkbox" [checked]="showIslands"   (change)="toggleIslands()">   Islands</label>
        <label class="uv-check-row"><input type="checkbox" [checked]="showUVPane"    (change)="toggleUVPane()">    Show UV Pane</label>
      </ng-container>
    </div>

<!-- ── Brush ───────────────────────────────────────────────────── -->
    <div class="uv-section">
      <app-brush-options [activeRasterTool]="'brush'"></app-brush-options>
    </div>

    <!-- ── Export ────────────────────────────────────────────────── -->
    <div class="uv-section">
      <div class="uv-section-title uv-section-toggle" (click)="exportCollapsed = !exportCollapsed">
        <span class="uv-chevron">{{ exportCollapsed ? '▸' : '▾' }}</span>Export
      </div>
      <ng-container *ngIf="!exportCollapsed">
        <div class="uv-field-row" style="margin-bottom:6px">
          <span class="uv-label">Size</span>
          <select class="uv-select" [(ngModel)]="exportSize">
            <option [ngValue]="512">512</option>
            <option [ngValue]="1024">1024</option>
            <option [ngValue]="2048">2048</option>
            <option [ngValue]="4096">4096</option>
          </select>
        </div>
        <button class="uv-btn uv-btn-full" (click)="exportLayout()">Export UV Layout</button>
      </ng-container>
    </div>

  </div><!-- /uv-body -->

</div>
