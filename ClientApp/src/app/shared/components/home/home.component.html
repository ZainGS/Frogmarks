<div class="fm-start"
     [class.fm-start--visible]="showContent"
     [class.fm-start--exit]="isTransitioning"
     (click)="pushStart()">

  <svg class="fm-grid" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <pattern id="fm-grid-cell" width="20" height="20" patternUnits="userSpaceOnUse">
        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.75"/>
      </pattern>
    </defs>
    <rect width="200" height="200" fill="url(#fm-grid-cell)" stroke="white" stroke-width="0.75"/>
  </svg>

  <!-- Geometric particles — outlined shapes drifting left-to-right -->
  <div class="fm-particles" aria-hidden="true">
    <svg *ngFor="let p of particles"
         class="fm-particle"
         viewBox="0 0 100 100"
         [style.width.px]="p.size"
         [style.height.px]="p.size"
         [style.top]="p.top + '%'"
         [style.opacity]="p.opacity"
         [style.--dur]="p.dur + 's'"
         [style.--del]="p.delay + 's'"
         xmlns="http://www.w3.org/2000/svg">
      <circle   *ngIf="p.shape === 'circle'"
                cx="50" cy="50" r="44"
                stroke="white" stroke-width="2" fill="none"/>
      <rect     *ngIf="p.shape === 'square'"
                x="8" y="8" width="84" height="84"
                stroke="white" stroke-width="2" fill="none"/>
      <polygon  *ngIf="p.shape === 'triangle'"
                points="50,7 93,90 7,90"
                stroke="white" stroke-width="2" fill="none" stroke-linejoin="round"/>
    </svg>
  </div>

  <!-- Outer: scales UP with nearest-neighbour — inner: scales DOWN to compensate.
       Net visual size stays the same but rasterised at 1/pf resolution → pixels. -->
  <div class="fm-px-stage" [class.fm-px-stage--active]="isTransitioning">
    <div class="fm-center" [class.fm-center--frog]="showFrog">

      <div class="fm-title-group">
        <div class="fm-wordmark" [class.fm-wordmark--glitch]="isTransitioning">FROGMARKS<span class="fm-wordmark2" [class.fm-wordmark--glitch]="isTransitioning"><i>beta</i></span></div>
        <div class="fm-subtitle">A small corner of cyberspace for creators</div>
      </div>

      <!-- Floating sprite cursor — the Mario Paint moment -->
      <div *ngIf="showFrog"
           class="fm-cursor"
           [class.fm-cursor--frozen]="isPressed"
           [class.fm-cursor--exit]="isTransitioning">
        <img class="fm-sprite"
             [src]="isPressed ? 'assets/home/frog1.png' : 'assets/home/frog2.png'"
             alt="" aria-hidden="true">
        <!-- <img class="fm-palette" src="assets/home/palette.png" alt="" aria-hidden="true"> -->
      </div>

      <div class="fm-hint">click anywhere or press any key</div>

    </div>
  </div>

  <div class="fm-copy">© 2025 · Frogmarks</div>

  <div class="fm-exit-overlay" [class.fm-exit-overlay--active]="isTransitioning || exitOverlayActive"></div>

</div>
